<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="v2-base" cx=".4" cy=".35" r=".75">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset=".55" stop-color="#dde0e8"/>
            <stop offset="1" stop-color="#5e6878"/>
          </radialGradient>
          <radialGradient id="v2-atm" cx=".5" cy=".5" r=".55">
            <stop offset=".82" stop-color="#c8d8f0" stop-opacity="0"/>
            <stop offset="1" stop-color="#c8d8f0" stop-opacity=".35"/>
          </radialGradient>
          <radialGradient id="v2-term" cx="1" cy=".55" r=".55">
            <stop offset="0" stop-color="#181c28" stop-opacity=".45"/>
            <stop offset=".8" stop-color="#181c28" stop-opacity="0"/>
          </radialGradient>
          <filter id="v2-tex" x="0" y="0"><feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="3" seed="9"/><feColorMatrix values="0 0 0 0 .18  0 0 0 0 .2  0 0 0 0 .24  0 0 0 .25 0"/></filter>
          <filter id="v2-spec" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/><feSpecularLighting surfaceScale="5" specularConstant="1" specularExponent="25" lighting-color="#fff"><fePointLight x="55" y="48" z="170"/></feSpecularLighting><feComposite in2="SourceAlpha" operator="in"/></filter>
          <clipPath id="v2-clip"><circle cx="100" cy="100" r="78"/></clipPath>
        </defs>
        <circle cx="100" cy="100" r="92" fill="url(#v2-atm)"/>
        <circle cx="100" cy="100" r="78" fill="url(#v2-base)"/>
        <g clip-path="url(#v2-clip)">
          <rect width="200" height="200" filter="url(#v2-tex)" opacity=".4"/>
          <!-- lighter maria, less contrast -->
          <path d="M 28,52 Q 38,42 56,46 Q 70,56 68,72 Q 60,84 42,80 Q 24,72 24,60 Q 22,54 28,52 Z" fill="#8c95a8" opacity=".35"/>
          <path d="M 68,40 Q 80,36 90,44 Q 96,54 88,62 Q 76,66 68,58 Q 60,48 68,40 Z" fill="#8c95a8" opacity=".32"/>
          <path d="M 50,108 Q 64,104 78,112 Q 82,128 70,134 Q 50,134 44,120 Q 42,112 50,108 Z" fill="#8c95a8" opacity=".35"/>
          <path d="M 100,118 Q 114,114 124,126 Q 124,140 110,142 Q 96,138 98,124 Q 96,120 100,118 Z" fill="#8c95a8" opacity=".32"/>
          <!-- fewer, smaller craters -->
          <g transform="translate(48 88)"><circle r="3.5" fill="#384458"/><path d="M -2.8,-2.2 A 3.8,3.8 0 0,1 2.8,-2.2" stroke="#ffffff" stroke-width=".7" fill="none" opacity=".8"/></g>
          <g transform="translate(78 142)"><circle r="3" fill="#384458"/><path d="M -2.4,-2 A 3.2,3.2 0 0,1 2.4,-2" stroke="#ffffff" stroke-width=".8" fill="none" opacity=".75"/></g>
          <g transform="translate(30 96)"><circle r="2" fill="#384458"/></g>
          <g fill="#384458" opacity=".55">
            <circle cx="118" cy="44" r="1.2"/><circle cx="146" cy="100" r="1.4"/>
            <circle cx="150" cy="156" r="1.2"/><circle cx="56" cy="42" r="1"/>
          </g>
          <circle cx="100" cy="100" r="78" fill="url(#v2-term)"/>
        </g>
        <!-- stronger specular for "glossy" feel -->
        <circle cx="100" cy="100" r="78" fill="#fff" filter="url(#v2-spec)" opacity=".95" style="mix-blend-mode:screen"/>
      </svg>
