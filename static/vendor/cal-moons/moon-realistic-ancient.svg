<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="v4-base" cx=".4" cy=".35" r=".75">
            <stop offset="0" stop-color="#c8c0b0"/>
            <stop offset=".55" stop-color="#988e78"/>
            <stop offset="1" stop-color="#382e1c"/>
          </radialGradient>
          <radialGradient id="v4-atm" cx=".5" cy=".5" r=".55">
            <stop offset=".82" stop-color="#b8a890" stop-opacity="0"/>
            <stop offset="1" stop-color="#b8a890" stop-opacity=".22"/>
          </radialGradient>
          <radialGradient id="v4-term" cx="1" cy=".55" r=".55">
            <stop offset="0" stop-color="#0a0604" stop-opacity=".55"/>
            <stop offset=".8" stop-color="#0a0604" stop-opacity="0"/>
          </radialGradient>
          <filter id="v4-tex" x="0" y="0"><feTurbulence type="fractalNoise" baseFrequency="2" numOctaves="3" seed="13"/><feColorMatrix values="0 0 0 0 .18  0 0 0 0 .15  0 0 0 0 .08  0 0 0 .5 0"/></filter>
          <filter id="v4-spec" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="4"/><feSpecularLighting surfaceScale="3" specularConstant=".4" specularExponent="18" lighting-color="#fff0c8"><fePointLight x="55" y="48" z="200"/></feSpecularLighting><feComposite in2="SourceAlpha" operator="in"/></filter>
          <clipPath id="v4-clip"><circle cx="100" cy="100" r="78"/></clipPath>
        </defs>
        <circle cx="100" cy="100" r="92" fill="url(#v4-atm)"/>
        <circle cx="100" cy="100" r="78" fill="url(#v4-base)"/>
        <g clip-path="url(#v4-clip)">
          <rect width="200" height="200" filter="url(#v4-tex)" opacity=".7"/>
          <!-- MANY large maria, denser -->
