# ============================================================================
# Chronicle CI/CD Pipeline
# ============================================================================
# Triggers on pushes to main and pull requests.
# 1. Runs Go build, vet, and tests
# 2. Builds Docker image and pushes to GitHub Container Registry (ghcr.io)
#
# Image URL: ghcr.io/<owner>/chronicle:latest
# Pull with:  docker pull ghcr.io/<owner>/chronicle:latest
# ============================================================================

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger from Actions UI when auto-triggers fail.

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- Build & Test ---
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        # Full history required by the plugin-isolation guard's diff-base lookup
        # (it diffs origin/<base>...HEAD; a shallow clone breaks that).
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Install templ
        # Pin to the runtime version in go.mod. The generator and the
        # runtime go in lockstep — `@latest` drifts ahead of go.mod and
        # emits symbols (e.g. templ.ResolveAttributeValue) the pinned
        # runtime doesn't have, breaking every PR until go.mod catches up.
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Generate templ files
        run: templ generate

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Scrub guard (no operator instance hostnames in tracked source)
        # Per C-SCRUB-INSTANCE-URLS (2026-05-20): operator-security
        # requirement that production hostnames stay out of the repo.
        # The script itself reconstructs the forbidden token via fragment
        # join so it doesn't fail-self.
        run: ./tools/check-no-instance-hostname.sh

      - name: Plugin isolation guard (M-B2.1)
        # Per C-CI-GUARDS-PHASE-2 + cordinator/decisions/2026-05-21-core-tenets.md §T-B2.
        # Diff-scoped FAIL: catches NEW foundry-vtt plugin-name literals
        # introduced outside internal/plugins/foundry_vtt/. Existing 161
        # violations in main are grandfathered until NW-2.2 cleanup lands.
        # Needs full git history for the diff; fetch-depth: 0 below.
        run: ./tools/check-plugin-isolation.sh

      - name: Templ drift guard (M-O3.1 family)
        # Per C-CI-GUARDS-PHASE-2 + cordinator/reports/chronicle/2026-05-21-c-hygiene-audit.md §0.5 D6.
        # Re-runs `templ generate` and fails if the working tree diverges
        # from what's checked in. Catches forgot-to-regenerate scenarios.
        # templ binary already installed above; pinned to v0.3.1001.
        run: ./tools/check-templ-drift.sh

      - name: Test
        run: go test ./... -v -short

      - name: Decision-citations lint (M-O3.1, WARN-only)
        # Per C-CI-GUARDS-PHASE-2 + cordinator/reports/coordinator/2026-05-21-c-meta-audit.md
        # Phase 2 deliverable. Surfaces orphan cordinator/decisions/*.md docs.
        # WARN-only: always exits 0. In Chronicle CI the Cordinator repo isn't
        # checked out, so this prints "nothing to check" and exits clean. The
        # guard is fully effective when run from a coordinator session that
        # has all three repos local. Kept here so any future CI runner that
        # checks out all three repos exercises it automatically.
        continue-on-error: true
        run: ./tools/check-decision-citations.sh

  # --- Lint ---
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Install templ
        # Pin to the runtime version in go.mod. The generator and the
        # runtime go in lockstep — `@latest` drifts ahead of go.mod and
        # emits symbols (e.g. templ.ResolveAttributeValue) the pinned
        # runtime doesn't have, breaking every PR until go.mod catches up.
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Generate templ files
        run: templ generate

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0

  # --- Security Scan ---
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        # Advisory: stdlib vulnerabilities require a Go toolchain upgrade.
        # Non-blocking so stdlib-only findings don't break CI.
        continue-on-error: true
        run: govulncheck ./...

  # --- Docker Build & Push to GHCR ---
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    # Only push images on main branch pushes, tags, or manual dispatch — not PRs.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with "latest" on main branch pushes
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with semver on version tags (v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Tag with short SHA for traceability
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Disable provenance + SBOM attestations. build-push-action@v6
          # generates these by default, which adds extra manifest/blob
          # entries that ghcr.io intermittently rejects on push with
          # "ERROR: unknown blob". We don't consume the attestations, so
          # turning them off both fixes the flaky push and produces a
          # cleaner single-manifest image.
          provenance: false
          sbom: false
